<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Hammer: handle as rotated rectangle + head as rounded rect -->
  <!-- Handle -->
  <rect x="1" y="10" width="10" height="2" rx="1"
        fill="currentColor" transform="rotate(-45 6 11)"/>
  <!-- Hammer head -->
  <rect x="8" y="1" width="6" height="4" rx="1" fill="currentColor"
        transform="rotate(-45 11 3)"/>
</svg>
