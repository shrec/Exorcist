name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  QT_VERSION: '6.7.3'

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev clang

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: Analyze
        uses: github/codeql-action/analyze@v3
