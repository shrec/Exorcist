name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.7.3'

jobs:
  # ─────────────────────────────────────────────
  #  Linux – GCC
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev xvfb

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: xvfb-run -a ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  Windows – MSVC 2022
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  SonarCloud – C++ static analysis
  # ─────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-24.04
    needs: [build-linux]
    # Skip on fork PRs (SONAR_TOKEN not available there)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame & new-code detection

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci   # CMAKE_EXPORT_COMPILE_COMMANDS=ON → build-ci/compile_commands.json

      - name: Build
        run: cmake --build build-ci --parallel

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
