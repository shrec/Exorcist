name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.7.3'

jobs:
  # ─────────────────────────────────────────────
  #  Linux – Clang
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (Clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev xvfb clang

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: Test
        run: xvfb-run -a ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  Windows – Clang (llvm-mingw)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (Clang/llvm-mingw)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_llvm_mingw
          cache: true

      - name: Install llvm-mingw toolchain
        shell: pwsh
        run: |
          Invoke-WebRequest `
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20240726/llvm-mingw-20240726-ucrt-x86_64.zip" `
            -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath D:\llvm-mingw
          $dir = (Get-ChildItem D:\llvm-mingw -Directory | Select-Object -First 1).FullName
          "$dir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        run: cmake --preset ci -DCMAKE_RC_COMPILER=llvm-windres
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  SonarCloud – C++ static analysis
  # ─────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-24.04
    needs: [build-linux]
    # Skip on fork PRs (SONAR_TOKEN not available there)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame & new-code detection
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev clang llvm xvfb

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install build-wrapper
        run: |
          curl -sSLo build-wrapper-linux-x86-64.zip "https://sonarcloud.io/static/cpp/build-wrapper-linux-x86-64.zip"
          unzip -o build-wrapper-linux-x86-64.zip
          echo "$(ls -d build-wrapper-linux-x86-64-*)" >> $GITHUB_PATH

      - name: Configure (Debug + coverage)
        run: >
          cmake --preset ci
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"
        env:
          CC: clang
          CXX: clang++

      - name: Build (with build-wrapper for CFamily analysis)
        run: build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: Test (coverage)
        run: |
          xvfb-run -a ctest --test-dir build-ci --output-on-failure --parallel 4 || true
        env:
          QT_QPA_PLATFORM: offscreen
          LLVM_PROFILE_FILE: build-ci/coverage-%p.profraw

      - name: Generate coverage for SonarCloud
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          raw=(build-ci/coverage-*.profraw)
          if [ ${#raw[@]} -eq 0 ]; then
            echo "No coverage data — skipping."
            touch build-ci/coverage-report.txt
            exit 0
          fi
          llvm-profdata merge -sparse "${raw[@]}" -o build-ci/coverage.profdata
          if [ ! -f build-ci/src/exorcist ]; then
            echo "Binary not found — skipping."
            touch build-ci/coverage-report.txt
            exit 0
          fi
          llvm-cov show \
            --instr-profile=build-ci/coverage.profdata \
            build-ci/src/exorcist \
            > build-ci/coverage-report.txt

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  # ДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДД
  #  Coverage - Codecov
  # ДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДДД
  coverage:
    name: Coverage (Codecov)
    runs-on: ubuntu-24.04
    needs: [build-linux]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev clang llvm

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure (coverage)
        run: >
          cmake --preset ci
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
          -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: Test
        run: xvfb-run -a ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen
          LLVM_PROFILE_FILE: build-ci/coverage-%p.profraw

      - name: Generate coverage report
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          raw=(build-ci/coverage-*.profraw)
          if [ ${#raw[@]} -eq 0 ]; then
            echo "No coverage data generated."
            exit 0
          fi
          llvm-profdata merge -sparse "${raw[@]}" -o build-ci/coverage.profdata
          if [ ! -f build-ci/src/exorcist ]; then
            echo "Main binary not found, skipping coverage export."
            exit 0
          fi
          llvm-cov export \
            -format=lcov \
            --instr-profile=build-ci/coverage.profdata \
            build-ci/src/exorcist \
            > build-ci/coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build-ci/coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
