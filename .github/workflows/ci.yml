name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.7.3'

jobs:
  # ─────────────────────────────────────────────
  #  Linux – Clang
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (Clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev xvfb clang

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: Test
        run: xvfb-run -a ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  Windows – Clang (llvm-mingw)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (Clang/llvm-mingw)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_llvm_mingw
          cache: true

      - name: Install llvm-mingw toolchain
        shell: pwsh
        run: |
          Invoke-WebRequest `
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20240726/llvm-mingw-20240726-ucrt-x86_64.zip" `
            -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath D:\llvm-mingw
          $dir = (Get-ChildItem D:\llvm-mingw -Directory | Select-Object -First 1).FullName
          "$dir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure
        run: cmake --preset ci -DCMAKE_RC_COMPILER=llvm-windres
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure --parallel 4
        env:
          QT_QPA_PLATFORM: offscreen

  # ─────────────────────────────────────────────
  #  SonarCloud – C++ static analysis
  # ─────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-24.04
    needs: [build-linux]
    # Skip on fork PRs (SONAR_TOKEN not available there)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame & new-code detection

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev clang

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake --preset ci   # CMAKE_EXPORT_COMPILE_COMMANDS=ON → build-ci/compile_commands.json
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build build-ci --parallel
        env:
          CC: clang
          CXX: clang++

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
