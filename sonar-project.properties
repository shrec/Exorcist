sonar.projectKey=shrec_Exorcist
sonar.organization=shrec
sonar.projectName=Exorcist
sonar.projectVersion=0.1.0
sonar.host.url=https://sonarcloud.io

sonar.sources=src,plugins
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C/C++ analysis via build-wrapper (more reliable than compile_commands.json)
sonar.cfamily.build-wrapper-output=bw-output

# Coverage (LLVM source-based, generated in CI)
sonar.cfamily.llvm-cov.reportPath=build-ci/coverage-report.txt

# New code definition (avoid "previous version" with no baseline)
sonar.newCode.referenceBranch=main

# Don't fail CI when quality gate fails (project is in early development)
sonar.qualitygate.wait=false

# Exclude Qt auto-generated files, build artifacts, and third-party research repos
sonar.exclusions=\
  **/moc_*.cpp,\
  **/*.moc.cpp,\
  **/ui_*.h,\
  **/qrc_*.cpp,\
  build-ci/**,\
  build/**,\
  build-llvm/**,\
  ReserchRepos/**
