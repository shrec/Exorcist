sonar.projectKey=shrec_Exorcist
sonar.organization=shrec
sonar.projectName=Exorcist
sonar.projectVersion=0.1.0

sonar.sources=src,plugins,server
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C/C++ analysis via compile_commands.json (generated by ci preset)
sonar.cfamily.compile-commands=build-ci/compile_commands.json

# New code definition (avoid "previous version" with no baseline)
sonar.newCode.referenceBranch=main

# Don't fail CI when quality gate fails (project is in early development)
sonar.qualitygate.wait=false

# Coverage: not collected for C++ yet — exclude all sources so the
# quality gate "Coverage on New Code" condition is not evaluated.
sonar.coverage.exclusions=**/*

# Duplication: header-only tool classes have unavoidable repetition
# in spec() definitions; exclude tool headers from CPD.
sonar.cpd.exclusions=src/agent/tools/**/*.h

# Exclude Qt auto-generated files, build artifacts, third-party, and research repos
sonar.exclusions=\
  **/moc_*.cpp,\
  **/*.moc.cpp,\
  **/ui_*.h,\
  **/qrc_*.cpp,\
  build-ci/**,\
  build/**,\
  build-llvm/**,\
  build-release/**,\
  third_party/**,\
  ReserchRepos/**,\
  _deps/**
