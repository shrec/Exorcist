sonar.projectKey=shrec_Exorcist
sonar.organization=shrec
sonar.projectName=Exorcist
sonar.projectVersion=0.1.0

sonar.sources=src,plugins
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C/C++ – output from build-wrapper (generated during CI build)
sonar.cfamily.compile-commands=bw-output/compile_commands.json

# Exclude Qt auto-generated files and build artifacts
sonar.exclusions=\
  **/moc_*.cpp,\
  **/*.moc.cpp,\
  **/ui_*.h,\
  **/qrc_*.cpp,\
  build-ci/**,\
  build/**,\
  build-llvm/**
